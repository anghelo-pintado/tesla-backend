server:
  port: 8080 # El puerto principal de entrada a todo tu sistema

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # 1. Ruta para el Monolito (Auth y Usuarios)
        - id: monolith-auth
          uri: http://localhost:8081 # Aquí es donde corre tu proyecto actual
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**

        # 2. Ruta para el Microservicio de Chat (WebSockets)
        - id: chat-service
          uri: http://localhost:8082 # Donde correrá el servicio del compañero 2
          predicates:
            - Path=/ws/**